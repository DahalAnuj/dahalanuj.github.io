<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Anuj's Headspace</title>
        <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #1a2f45;
                cursor: url("images/cursor.cur"), auto;
            }

            #bg {
                position: fixed;
                inset: 0;
                z-index: 0;
            }

            /* Subtle dark gradient overlay at bottom for text legibility */
            #bg::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(to bottom, transparent 40%, rgba(12, 22, 35, 0.55) 100%);
                pointer-events: none;
            }

            .tv {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                margin-top: 35vh;
                height: 25vh;
                position: relative;
            }

            .screen {
                max-width: 100%;
                max-height: 25vh;
                z-index: 1;
                position: absolute;
            }

            .headspace,
            .photography,
            .poetry,
            .aerospace,
            .credentials {
                transition: cubic-bezier(0.075, 0.82, 0.165, 1) 1s;
            }

            .headspace.hidden {
                opacity: 0;
            }

            .aerospace.hidden {
                opacity: 0;
            }

            .poetry.hidden {
                opacity: 0;
            }

            .photography.hidden {
                opacity: 0;
            }

            .credentials.hidden {
                opacity: 0;
            }

            .off.hidden {
                opacity: 0;
            }

            .camera {
                display: flex;
                margin-left: 10vw;
                margin-top: -50vh;
                height: 25vh;
                position: relative;
            }

            .camera img {
                max-width: 100%;
                height: auto;
                z-index: 3;
                transition: transform 0.2s ease;
            }

            .camera img:hover {
                cursor: url("images/pointer.cur"), pointer;
                transform: rotate(5deg);
            }

            .shuttle {
                display: flex;
                margin-left: 80vw;
                margin-top: 20vh;
                height: 35vh;
                position: relative;
            }

            .shuttle img {
                max-width: 100%;
                height: auto;
                z-index: 4;
                transition: transform 0.2s ease;
            }

            .shuttle img:hover {
                cursor: url("images/pointer.cur"), pointer;
                transform: rotate(-5deg);
            }

            .bamboo {
                display: flex;
                margin-left: 70vw;
                margin-top: -80vh;
                height: 25vh;
                position: relative;
            }

            .bamboo img {
                max-width: 100%;
                height: auto;
                z-index: 3;
                transition: transform 0.2s ease;
            }

            .bamboo img:hover {
                cursor: url("images/pointer.cur"), pointer;
                transform: rotate(5deg);
            }

            .notepad {
                display: flex;
                margin-left: 13vw;
                margin-top: 20vh;
                height: 30vh;
                position: relative;
            }

            .notepad img {
                max-width: 100%;
                height: auto;
                z-index: 4;
                transition: transform 0.2s ease;
                transform: rotate(3deg);
            }

            .notepad img:hover {
                cursor: url("images/pointer.cur"), pointer;
                transform: rotate(-2deg);
            }
        </style>
    </head>

    <body>
        <div class="tv">
            <img class="screen photography" src="images/anujsPhotography.gif" />
            <img class="screen aerospace" src="images/anujsAerospace.gif" />
            <img class="screen poetry" src="images/anujsPoetry.gif" />
            <img class="screen credentials" src="images/anujsCredentials.gif" />
            <img class="screen off hidden" src="images/tvOff.gif" />
            <img class="screen headspace" src="images/anujsHeadspace.gif" />
        </div>

        <div class="camera">
            <img src="images/camera.png" />
        </div>

        <div class="shuttle">
            <img src="images/shuttle.png" />
        </div>

        <div class="bamboo">
            <img src="images/bambooShoots.png" />
        </div>

        <div class="notepad">
            <img src="images/notepad.png" />
        </div>

        <div id="bg"></div>

        <script>
            const camera = document.querySelector(".camera img");
            const shuttle = document.querySelector(".shuttle img");
            const bamboo = document.querySelector(".bamboo img");
            const notepad = document.querySelector(".notepad img");
            const screen = document.querySelector(".screen");
            const off = document.querySelector(".off");
            const preloadedOff = new Image();
            preloadedOff.src = "images/tvOff.gif";

            camera.addEventListener("mouseenter", () => {
                document.querySelector(".headspace").classList.add("hidden");
                document.querySelector(".aerospace").classList.add("hidden");
                document.querySelector(".poetry").classList.add("hidden");
                document.querySelector(".credentials").classList.add("hidden");
                camera.src = "images/cameraOutlined.png";
                camera.addEventListener("click", () => {
                    document.querySelector(".headspace").classList.add("hidden");
                    document.querySelector(".aerospace").classList.add("hidden");
                    document.querySelector(".poetry").classList.add("hidden");
                    document.querySelector(".photography").classList.add("hidden");
                    document.querySelector(".credentials").classList.add("hidden");
                    document.querySelector(".off").classList.remove("hidden");
                    setTimeout(() => {
                        off.src = preloadedOff.src;
                    }, 0);
                });
            });

            camera.addEventListener("mouseleave", () => {
                document.querySelector(".headspace").classList.remove("hidden");
                document.querySelector(".aerospace").classList.remove("hidden");
                document.querySelector(".poetry").classList.remove("hidden");
                document.querySelector(".credentials").classList.remove("hidden");
                document.querySelector(".off").classList.add("hidden");
                camera.src = "images/camera.png";
            });

            shuttle.addEventListener("mouseenter", () => {
                document.querySelector(".headspace").classList.add("hidden");
                document.querySelector(".poetry").classList.add("hidden");
                document.querySelector(".photography").classList.add("hidden");
                document.querySelector(".credentials").classList.add("hidden");
                shuttle.src = "images/shuttleOutlined.png";
                shuttle.addEventListener("click", () => {
                    document.querySelector(".headspace").classList.add("hidden");
                    document.querySelector(".photography").classList.add("hidden");
                    document.querySelector(".poetry").classList.add("hidden");
                    document.querySelector(".photography").classList.add("hidden");
                    document.querySelector(".credentials").classList.add("hidden");
                    document.querySelector(".off").classList.remove("hidden");
                    setTimeout(() => {
                        off.src = preloadedOff.src;
                    }, 0);
                    window.location.href = "aerospace.html";
                });
            });

            shuttle.addEventListener("mouseleave", () => {
                document.querySelector(".headspace").classList.remove("hidden");
                document.querySelector(".poetry").classList.remove("hidden");
                document.querySelector(".photography").classList.remove("hidden");
                document.querySelector(".credentials").classList.remove("hidden");
                document.querySelector(".off").classList.add("hidden");
                shuttle.src = "images/shuttle.png";
            });

            bamboo.addEventListener("mouseenter", () => {
                document.querySelector(".headspace").classList.add("hidden");
                document.querySelector(".aerospace").classList.add("hidden");
                document.querySelector(".photography").classList.add("hidden");
                document.querySelector(".credentials").classList.add("hidden");
                bamboo.src = "images/bambooShootsOutlined.png";
                bamboo.addEventListener("click", () => {
                    document.querySelector(".headspace").classList.add("hidden");
                    document.querySelector(".photography").classList.add("hidden");
                    document.querySelector(".aerospace").classList.add("hidden");
                    document.querySelector(".photography").classList.add("hidden");
                    document.querySelector(".credentials").classList.add("hidden");
                    document.querySelector(".off").classList.remove("hidden");
                    setTimeout(() => {
                        off.src = preloadedOff.src;
                    }, 0);
                    window.location.href = "poetry.html";
                });
            });

            bamboo.addEventListener("mouseleave", () => {
                document.querySelector(".headspace").classList.remove("hidden");
                document.querySelector(".aerospace").classList.remove("hidden");
                document.querySelector(".photography").classList.remove("hidden");
                document.querySelector(".credentials").classList.remove("hidden");
                document.querySelector(".off").classList.add("hidden");
                bamboo.src = "images/bambooShoots.png";
            });

            notepad.addEventListener("mouseenter", () => {
                document.querySelector(".headspace").classList.add("hidden");
                document.querySelector(".aerospace").classList.add("hidden");
                document.querySelector(".photography").classList.add("hidden");
                document.querySelector(".poetry").classList.add("hidden");
                notepad.src = "images/notepadOutlined.png";
            });

            notepad.addEventListener("mouseleave", () => {
                document.querySelector(".headspace").classList.remove("hidden");
                document.querySelector(".aerospace").classList.remove("hidden");
                document.querySelector(".photography").classList.remove("hidden");
                document.querySelector(".poetry").classList.remove("hidden");
                document.querySelector(".off").classList.add("hidden");
                notepad.src = "images/notepad.png";
            });
        </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
        <script>
            (function () {
                const container = document.getElementById("bg");

                const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 1, 3000);
                camera.position.z = 6000;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a2f45);

                const fog = new THREE.Fog(0x2a4a66, -100, 3000);
                scene.fog = fog;

                const texture = new THREE.TextureLoader().load(
                    "https://mrdoob.com/lab/javascript/webgl/clouds/cloud10.png",
                    startAnimation
                );
                texture.magFilter = THREE.LinearMipMapLinearFilter;
                texture.minFilter = THREE.LinearMipMapLinearFilter;

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        map: { value: texture },
                        fogColor: { value: fog.color },
                        fogNear: { value: fog.near },
                        fogFar: { value: fog.far }
                    },
                    vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
                    fragmentShader: `
          uniform sampler2D map;
          uniform vec3 fogColor;
          uniform float fogNear;
          uniform float fogFar;
          varying vec2 vUv;
          void main() {
            float depth = gl_FragCoord.z / gl_FragCoord.w;
            float fogFactor = smoothstep(fogNear, fogFar, depth);
            gl_FragColor = texture2D(map, vUv);
            gl_FragColor.w *= pow(gl_FragCoord.z, 20.0);
            gl_FragColor = mix(gl_FragColor, vec4(fogColor, gl_FragColor.w), fogFactor);
          }`,
                    depthWrite: false,
                    depthTest: false,
                    transparent: true
                });

                // Build merged geometry using modern BufferGeometry
                function buildCloudMesh() {
                    const planeGeo = new THREE.PlaneGeometry(64, 64);
                    const positions = [];
                    const uvs = [];
                    const indices = [];
                    let vertexOffset = 0;

                    const dummy = new THREE.Object3D();

                    for (let i = 0; i < 8000; i++) {
                        dummy.position.set(Math.random() * 1000 - 500, -Math.random() * Math.random() * 200 - 30, i);
                        dummy.rotation.z = Math.random() * Math.PI;
                        const s = Math.random() * Math.random() * 1.5 + 0.5;
                        dummy.scale.set(s, s, 1);
                        dummy.updateMatrix();

                        const posAttr = planeGeo.attributes.position;
                        for (let v = 0; v < posAttr.count; v++) {
                            const vec = new THREE.Vector3(
                                posAttr.getX(v),
                                posAttr.getY(v),
                                posAttr.getZ(v)
                            ).applyMatrix4(dummy.matrix);
                            positions.push(vec.x, vec.y, vec.z);
                        }

                        const uvAttr = planeGeo.attributes.uv;
                        for (let v = 0; v < uvAttr.count; v++) {
                            uvs.push(uvAttr.getX(v), uvAttr.getY(v));
                        }

                        const idxArr = planeGeo.index.array;
                        for (let j = 0; j < idxArr.length; j++) {
                            indices.push(idxArr[j] + vertexOffset);
                        }
                        vertexOffset += posAttr.count;
                    }

                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
                    geo.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
                    geo.setIndex(indices);
                    return geo;
                }

                const geometry = buildCloudMesh();

                const mesh1 = new THREE.Mesh(geometry, material);
                scene.add(mesh1);

                const mesh2 = new THREE.Mesh(geometry, material);
                mesh2.position.z = -8000;
                scene.add(mesh2);

                const renderer = new THREE.WebGLRenderer({ antialias: false });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                window.addEventListener("resize", () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                let started = false;
                const startTime = Date.now();

                function startAnimation() {
                    if (started) return;
                    started = true;
                    animate();
                }

                function animate() {
                    requestAnimationFrame(animate);
                    const position = ((Date.now() - startTime) * 0.005) % 8000;
                    camera.position.z = -position + 8000;
                    renderer.render(scene, camera);
                }
            })();
        </script>
    </body>
</html>
