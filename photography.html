<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Anuj's Photography</title>
        <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                font-family: "Book Antiqua", "Palatino Linotype", Palatino, serif;
                cursor: url("images/cursor.cur"), auto;
                background-color: #141414;
                background-image: url("images/velvet.jpg");
            }

            a:link,
            a:visited,
            a:hover,
            a:active {
                text-decoration: none;
                color: inherit;
            }

            a:hover {
                cursor: url("images/pointer.cur"), auto;
            }

            .header {
                position: relative;
                text-align: left;
                padding-left: 2vw;
                padding-top: 1vh;
                font-size: 2.5vh;
                z-index: 1;
                color: white;
                cursor: url("images/cursor.cur"), auto;
            }

            .photography {
                background: linear-gradient(45deg, #9e6c4b, #819b00);
                background-clip: text;
                color: transparent;
            }

            img {
                display: block;
                max-width: 60%;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>
                <a href="index.html">Anuj's</a>
                <span class="photography"><a href="photography.html">Photography</a></span>
            </h1>
        </div>
        <div class="stack">
            <div class="card">
                <div class="image"></div>
            </div>
        </div>
    </body>
</html>
